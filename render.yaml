services:
  # Backend Service
  - type: web
    name: youtube-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend/chai-backend && npm install
    startCommand: cd backend/chai-backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: youtube
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRY
        value: 1d
      - key: REFRESH_TOKEN_EXPIRY
        value: 10d
      - key: CORS_ORIGIN
        sync: false
    healthCheckPath: /healthcheck

# Note: Static sites are not supported in render.yaml blueprints
# Deploy frontend manually as a Static Site after backend is deployed
